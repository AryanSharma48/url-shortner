services:

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: aryan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: url_shortner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: url_shortner
    environment:
      DATABASE_URL: postgresql://aryan:${POSTGRES_PASSWORD}@db:5432/url_shortner
      PORT: 3000
    ports: 
       - "3000:3000"
    depends_on:
      - db
volumes:
  postgres_data: